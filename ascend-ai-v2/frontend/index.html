<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCEND AI — Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>⚡</text></svg>">
</head>
<body>
  <div class="bg-orbs"></div>
  <div class="bg-grid"></div>
  <div id="toast-container"></div>

  <main class="auth-page">
    <div class="auth-wrap">

      <!-- Back to landing -->
      <a href="landing.html" class="auth-back">← Back to home</a>

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-bolt">⚡</div>
        ASCEND<span>AI</span>
      </div>

      <div class="auth-card">

        <!-- Tabs -->
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-target="login-form-wrap">Sign In</button>
          <button class="auth-tab" data-target="register-form-wrap">Create Account</button>
        </div>

        <!-- ── Login ── -->
        <div id="login-form-wrap" class="auth-form">
          <form id="login-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="login-email">Email</label>
              <input class="form-input" type="email" id="login-email" placeholder="you@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="login-password">Password</label>
              <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <div class="form-error" id="login-error"></div>
            <button type="submit" class="btn btn-primary mt-16">Sign In →</button>
          </form>
        </div>

        <!-- ── Register ── -->
        <div id="register-form-wrap" class="auth-form hidden">
          <form id="register-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="reg-name">Full Name</label>
              <input class="form-input" type="text" id="reg-name" placeholder="Alex Johnson" autocomplete="name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-email">Email</label>
              <input class="form-input" type="email" id="reg-email" placeholder="you@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-password">Password</label>
              <input class="form-input" type="password" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-confirm">Confirm Password</label>
              <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat password" autocomplete="new-password" required>
            </div>
            <div class="form-error" id="register-error"></div>
            <button type="submit" class="btn btn-primary mt-16">Start Ascending →</button>
          </form>
        </div>

      </div><!-- /auth-card -->

      <p class="text-center text-sm text-muted mt-16" style="font-size:0.75rem;font-family:var(--font-mono)">
        No credit card · No ads · Open source
      </p>

    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    // Per-form error helpers
    function showError(form, msg) {
      const id = form.id === 'login-form' ? 'login-error' : 'register-error';
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.classList.add('show'); }
    }
    function clearErrors(form) {
      document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
    }
  </script>
</body>
</html>
